<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visual Docs</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%90%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/assets/app.css">
<link rel="stylesheet" href="/assets/vendor/diff2html.min.css" integrity="sha384-iBvSlI3tNrrSIy7s6mvLg+5B2Z/QXbR4L0Pzg1nRf8zkXrz5JF316MLm2igMIpi2">
<link rel="stylesheet" href="/assets/vendor/hljs-github.min.css" id="hljs-light" integrity="sha384-eFTL69TLRZTkNfYZOLM+G04821K1qZao/4QLJbet1pP4tcF+fdXq/9CdqAbWRl/L">
<link rel="stylesheet" href="/assets/vendor/hljs-github-dark.min.css" id="hljs-dark" disabled integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH">
<script src="/assets/vendor/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"></script>
<script src="/assets/vendor/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"></script>
<script src="/assets/vendor/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp"></script>
<script src="/assets/vendor/mermaid.min.js" integrity="sha384-WmdflGW9aGfoBdHc4rRyWzYuAjEmDwMdGdiPNacbwfGKxBW/SO6guzuQ76qjnSlr"></script>
<script src="/assets/vendor/diff2html.min.js" integrity="sha384-1tVmtFdzvhqVP3vQWJmKYvD0uTtR0r+FhlLWw+vG6F/vNDS7yegNMNNHRS12fSyR"></script>
<script src="/assets/vendor/js-yaml.min.js" integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du"></script>
<script src="/assets/vendor/graphre.js" integrity="sha384-+DSRvfJ8fTBtLU9W0M1kWQnn4Ck9VxqJPN5qYz2dFSrn7XP0yyFs/9my1a5vgCbq"></script>
<script src="/assets/vendor/nomnoml.js" integrity="sha384-cQ6kIxrqYsimUdVijvas+DqrYHmHBewKrXNwm/CZzhk3MNRQ1GdsDDt4ZWo5ltIK"></script>
<script src="/assets/vendor/preact.min.js" integrity="sha384-8lYmL2zoJxGedi/gyeSimJrBzBq9UP16Q3610f5ILM6krTe3Q3zUwEBjEwokLA0g"></script>
<script src="/assets/vendor/preact-hooks.umd.js" integrity="sha384-3TOXhf2QfKuO2sx5nN6tX0tFWCkocWRxCUu1hkgFl0eIHD/9ZVPE1vF6haC1A+6y"></script>
<script src="/assets/vendor/htm.umd.js" integrity="sha384-toVdrLSMaw7Y55MowcKqkmFL/Ek6Sky62NOk0b5sDDZBu2wcoPyyQUt9unDVjXhL"></script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header class="side-head">
      <span class="side-mark">▤</span>
      <div>
        <div class="side-title">Visual Docs</div>
        <div class="side-sub mono">local · live</div>
      </div>
      <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </header>
    <nav id="doc-list" aria-label="Documents"></nav>
    <footer class="side-foot mono">
      <span id="conn-dot" class="dot"></span><span id="conn-label">connecting…</span>
    </footer>
  </aside>
  <main id="main">
    <div id="doc-header" hidden>
      <div class="titleblock">
        <div class="tb-cell tb-title">
          <span class="tb-label mono">document</span>
          <h1 id="tb-doc-title"></h1>
        </div>
        <div class="tb-cell">
          <span class="tb-label mono">file</span>
          <span id="tb-doc-path" class="mono"></span>
        </div>
        <div class="tb-cell">
          <span class="tb-label mono">updated</span>
          <span id="tb-doc-mtime" class="mono"></span>
        </div>
        <div class="tb-cell">
          <span class="tb-label mono">comments</span>
          <button id="tb-comments-btn" class="mono">0 open</button>
        </div>
      </div>
    </div>
    <article id="content" class="markdown-body">
      <div class="empty-state">
        <p class="mono">No document selected.</p>
        <p>Pick a document from the sidebar, or write a markdown file into the served directory and it will appear here.</p>
      </div>
    </article>
  </main>
  <aside id="comment-drawer" hidden>
    <header class="drawer-head">
      <span class="mono tb-label">comments</span>
      <button id="drawer-close" aria-label="Close comments">✕</button>
    </header>
    <div id="comment-context" class="mono" hidden></div>
    <div id="comment-list"></div>
    <form id="comment-form">
      <textarea id="comment-text" rows="4" placeholder="Leave feedback for the agent… It will read this before revising the document." required></textarea>
      <div class="form-actions">
        <button type="button" id="copy-prompt-btn" class="secondary" title="Copy this feedback as a prompt you can paste to your agent">Copy as prompt</button>
        <button type="submit">Add comment</button>
      </div>
      <div id="comment-status" class="mono" hidden></div>
    </form>
  </aside>
</div>
<script src="/assets/app.js"></script>
</body>
</html>
